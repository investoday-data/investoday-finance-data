name: Package Skills

on:
  # Update API References workflow 完成后自动触发（支持 GITHUB_TOKEN 推送的场景）
  workflow_run:
    workflows: ["Update API References"]
    types:
      - completed
    branches:
      - main

  # skills/ 有人工 push 变动时也触发（直接推送场景）
  push:
    branches:
      - main
    paths:
      - 'skills/**'

  # 支持手动触发
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    # workflow_run 触发时，仅在上游 workflow 成功后才继续
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package skills folder
        run: |
          cd skills
          zip -r ../investoday-finance-data-skills.zip .
          cd ..

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet investoday-finance-data-skills.zip 2>/dev/null && \
            git ls-files --error-unmatch investoday-finance-data-skills.zip 2>/dev/null && \
            echo "changed=false" >> $GITHUB_OUTPUT || \
            echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push investoday-finance-data-skills.zip
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add investoday-finance-data-skills.zip
          git commit -m "chore: update investoday-finance-data-skills.zip [skip ci]"
          git pull --rebase origin main
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "✅ investoday-finance-data-skills.zip already up-to-date, nothing to commit."

      - name: Upload to Tencent Cloud COS and purge CDN
        env:
          COS_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          pip install coscmd
          coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b "$COS_BUCKET" -r "$COS_REGION"
          coscmd upload investoday-finance-data-skills.zip application/skill-store/packages/investoday-finance-data/investoday-finance-data-skills.zip

          # 刷新 CDN 缓存
          pip install tencentcloud-sdk-python
          python3 - <<'EOF'
          import json, os
          from tencentcloud.common import credential
          from tencentcloud.cdn.v20180606 import cdn_client, models
          cred = credential.Credential(os.environ["COS_SECRET_ID"], os.environ["COS_SECRET_KEY"])
          client = cdn_client.CdnClient(cred, "")
          req = models.PurgeUrlsCacheRequest()
          req.Urls = ["https://storage.txyun.investoday.net/application/skill-store/packages/investoday-finance-data/investoday-finance-data-skills.zip"]
          resp = client.PurgeUrlsCache(req)
          print(f"CDN purge submitted: {resp.TaskId}")
          EOF
