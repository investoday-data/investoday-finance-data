name: Package Skills

on:
  # Update API References workflow 完成后自动触发（支持 GITHUB_TOKEN 推送的场景）
  workflow_run:
    workflows: ["Update API References"]
    types:
      - completed
    branches:
      - main

  # skills/ 有人工 push 变动时也触发（直接推送场景）
  push:
    branches:
      - main
    paths:
      - 'skills/**'

  # 支持手动触发
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    # workflow_run 触发时，仅在上游 workflow 成功后才继续
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package skills folder
        run: |
          cd skills
          zip -r ../investoday-finance-data-skills.zip .
          cd ..

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet investoday-finance-data-skills.zip 2>/dev/null && \
            git ls-files --error-unmatch investoday-finance-data-skills.zip 2>/dev/null && \
            echo "changed=false" >> $GITHUB_OUTPUT || \
            echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push investoday-finance-data-skills.zip
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add investoday-finance-data-skills.zip
          git commit -m "chore: update investoday-finance-data-skills.zip [skip ci]"
          git pull --rebase origin main
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "✅ investoday-finance-data-skills.zip already up-to-date, nothing to commit."
